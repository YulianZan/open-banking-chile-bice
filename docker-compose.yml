services:

  # ── Scraper (Node + Chromium) ──────────────────────────────────────────────
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: bice-scraper
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    shm_size: "256mb"
    volumes:
      - bank_data:/data
    environment:
      - BICE_RUT=${BICE_RUT}
      - BICE_PASS=${BICE_PASS}
      - BICE_MONTHS=${BICE_MONTHS:-3}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 7 * * *}
      - TZ=America/Santiago
      - DB_PATH=/data/bank_data.db
      - LOG_PATH=/data/cron.log
      - PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true
      - CHROME_PATH=/usr/bin/chromium

  # ── Dashboard (Python Flask) ───────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: bice-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - bank_data:/data:ro        # Solo lectura
    environment:
      - SECRET_KEY=${SECRET_KEY:-cambia-esto-en-produccion}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-admin123}
      - DB_PATH=/data/bank_data.db
      - TZ=America/Santiago
    depends_on:
      - scraper

# Volumen compartido entre ambos contenedores
volumes:
  bank_data:
    driver: local
